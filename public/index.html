<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="caixa.PNG">
</head>
<body>
    <header>
        <img class="logo" src="caixa.PNG" alt="Caixa de papelão">
        <h1>Sistema de Gerenciamento de Nível de Estoque</h1>
    </header>
    <main>
        <div class="painel">
            <button id="carregar">Carregar produtos</button>
        </div>
        <div class="produtos">
            <table id="tabela_produtos">
                <tr>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Quantidade em Estoque</th>
                </tr>
            </table>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
